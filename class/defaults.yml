---
parameters:
  renovate:
    =_metadata:
      multi_instance: true
      multi_tenant: true
    namespace: syn-${_instance}
    release_name: ${_instance}
    images:
      valkey:
        registry: docker.io
        repository: valkey/valkey
        tag: 9.0.3
    charts:
      renovate:
        source: oci://ghcr.io/renovatebot/charts/renovate
        version: 46.112.5
      valkey:
        source: https://valkey.io/valkey-helm
        version: 0.9.4
    components:
      valkey:
        enabled: false
        namespace: ${renovate:namespace}
        release_name: ${_instance}-valkey
    helm_values: {}
    valkey_helm_values:
      image: ${renovate:images:valkey}

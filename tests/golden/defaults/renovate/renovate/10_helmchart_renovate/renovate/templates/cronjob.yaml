apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/instance: renovate
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: renovate
    app.kubernetes.io/version: 43.88.1
    helm.sh/chart: renovate-46.83.0
  name: renovate
  namespace: syn-renovate
spec:
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/instance: renovate
        app.kubernetes.io/name: renovate
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: renovate
            app.kubernetes.io/name: renovate
        spec:
          containers:
            - env:
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config.json
              envFrom: null
              image: ghcr.io/renovatebot/renovate:43.88.1
              imagePullPolicy: IfNotPresent
              name: renovate
              volumeMounts:
                - mountPath: /usr/src/app/config.json
                  name: config-volume
                  subPath: config.json
          restartPolicy: Never
          serviceAccountName: default
          volumes:
            - configMap:
                name: renovate-config
              name: config-volume
  schedule: 0 1 * * *
  suspend: true

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: renovate-cache
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: valkey
    app.kubernetes.io/version: 9.0.3
    helm.sh/chart: valkey-0.9.4
  name: renovate-cache-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: renovate-cache
      app.kubernetes.io/name: valkey
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/initconfig: 0347152e72ce3a8b6a64cf23c6a583a5
      labels:
        app.kubernetes.io/instance: renovate-cache
        app.kubernetes.io/name: valkey
    spec:
      automountServiceAccountToken: false
      containers:
        - args:
            - /data/conf/valkey.conf
          command:
            - valkey-server
          env:
            - name: VALKEY_LOGLEVEL
              value: notice
          image: docker.io/valkey/valkey:9.0.3
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli ping
          name: renovate-cache-valkey
          ports:
            - containerPort: 6379
              name: tcp
              protocol: TCP
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli ping
          volumeMounts:
            - mountPath: /data
              name: valkey-data
      initContainers:
        - command:
            - /scripts/init.sh
          image: docker.io/valkey/valkey:9.0.3
          imagePullPolicy: IfNotPresent
          name: renovate-cache-valkey-init
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /data
              name: valkey-data
            - mountPath: /scripts
              name: scripts
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: renovate-cache-valkey
      volumes:
        - configMap:
            defaultMode: 365
            name: renovate-cache-valkey-init-scripts
          name: scripts
        - emptyDir: {}
          name: valkey-data

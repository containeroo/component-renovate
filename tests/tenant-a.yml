---
applications:
  - renovate as tenant-a

parameters:
  tenant_a:
    namespace: syn-renovate-tenant-a
    helm_values:
      cronjob:
        suspend: true
      renovate:
        config: |
          {
            "$schema": "https://docs.renovatebot.com/renovate-schema.json",
            "dryRun": "full"
          }
